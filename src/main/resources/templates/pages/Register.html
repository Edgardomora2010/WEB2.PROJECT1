<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>

    <!-- Codificación caracteres  -->
    <meta charset="UTF-8">

    <!-- Responsive Design-->
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <!-- SEO -->
    <meta name="description" content="Registro de cliente para tienda online">
    <meta name="keywords" content="NextShop, registro, cliente, tienda online, ecommerce">
    <meta name="author" content="Edgardo Mora M, Oscar Marín">

    <!-- Título de página principal -->
    <title>Register</title>

    <!-- Implementación de hoja de estilos-->
    <link rel="stylesheet" th:href="@{/css/GeneralStyle.css}">
    <link rel="stylesheet" th:href="@{/css/Components.css}">
    <link rel="stylesheet" th:href="@{/css/Sites.css}" />

</head>

<body>

<header>

    <!-- Área de Logo -->
    <div class="site_logo">
        <a th:href="@{/}">
            <img th:src="@{/images/appImages/NextShopLogo1.png}"
                 alt="NextShop Logo" height="300" width="auto" >
        </a>
    </div>

</header>

<main class="page_content">

    <div class="register_container">

        <!-- Sección decorativa -->
        <section class="register_section">

            <!-- Título de sección -->
            <h1>Crear una cuenta</h1>

            <!-- Formulario para registro de cliente -->
            <form th:action="@{/register}" method="post" class="register_form">

                <div>

                    <span class="register_row">

                        <!-- Nombre del cliente -->
                        <label for="name">
                            Nombre
                        </label>

                        <input type="text"
                               id="name"
                               name="name"
                               placeholder="Ingrese nombre"
                               required/>

                    </span>

                </div>

                <div>

                    <span class="register_row">

                        <!-- Apellidos del cliente -->
                        <label for="last_name">
                            Apellidos
                        </label>

                        <input type="text"
                               id="last_name"
                               name="last_name"
                               placeholder="Ingrese apellidos"
                               required/>

                    </span>

                </div>

                <div>

                    <span class="register_row">

                        <!-- Correo electrónico -->
                        <label for="email">
                            Correo electrónico
                        </label>

                        <input type="email"
                               id="email"
                               name="email"
                               placeholder="Ingrese correo electrónico"
                               required/>

                    </span>

                </div>

                <div>

                    <span class="register_row">

                        <!-- Contraseña -->
                        <label for="password">
                            Contraseña
                        </label>

                        <input type="password"
                               id="password"
                               name="password"
                               required/>

                    </span>

                </div>

                <div>

                    <span class="register_row">

                        <!-- Número de teléfono -->
                        <label for="phone_number">
                            Teléfono
                        </label>

                        <input type="text"
                               id="phone_number"
                               name="phone_number"
                               placeholder="Ingrese número de teléfono"/>

                    </span>

                </div>

                <div>

                    <span class="register_row">

                        <!-- Dirección del cliente -->
                        <label for="address">
                            Dirección
                        </label>

                        <input type="text"
                               id="address"
                               name="address"
                               placeholder="Ingrese dirección"/>

                    </span>

                </div>

                <div>

                    <!-- Botón para crear cuenta -->
                    <button type="submit">
                        Crear cuenta
                    </button>

                </div>

            </form>

        </section>

    </div>

</main>

<!-- FOOTER:  -->
<footer class="footer_container">
    <!-- Fragmento (repetible en templates) para Footer de página
    (redes sociales)-->
    <div th:replace="~{fragments/Footer :: footer_page}"></div>

</footer>

</body>
</html>
